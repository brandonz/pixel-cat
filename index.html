<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0d0d1f">
  <title>Pixel Cat 🐱</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body {
      background: #0d0d1f;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Press Start 2P', monospace;
      overflow: hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    #bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    #fx { position: fixed; inset: 0; z-index: 30; pointer-events: none; }
    .wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(10px, 2.5vh, 20px);
      padding: 16px;
    }
    .title {
      color: #ff88ff;
      font-size: clamp(7px, 3vw, 13px);
      text-shadow: 0 0 12px #ff44ff, 2px 2px 0 #440044;
      letter-spacing: 4px;
    }
    .screen {
      position: relative;
      background: radial-gradient(ellipse at 50% 30%, #1a1a3a 0%, #080814 100%);
      border-radius: 18px;
      padding: 6px;
      box-shadow:
        0 0 0 3px #2a2a5a,
        0 0 0 6px #111128,
        0 0 50px #4422aa55,
        0 0 100px #221155aa,
        inset 0 0 40px #00000077;
    }
    .screen-inner {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      background: #0a0a1e;
    }
    /* scanlines */
    .screen-inner::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent 0, transparent 3px,
        rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px
      );
      pointer-events: none;
      z-index: 10;
      border-radius: 12px;
    }
    /* glare */
    .screen-inner::before {
      content: '';
      position: absolute;
      top: 0; left: 5%; right: 5%;
      height: 40%;
      background: radial-gradient(ellipse at 50% 0%, rgba(255,255,255,0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 11;
    }
    #cat { display: block; }
    #mode-label {
      font-size: clamp(6px, 2.2vw, 10px);
      color: #88ff88;
      text-shadow: 0 0 8px #44ff44;
      letter-spacing: 2px;
      transition: color 0.8s, text-shadow 0.8s;
    }
    #mode-label.sleeping {
      color: #aaaaff;
      text-shadow: 0 0 10px #6666ff;
    }
    #hint-label {
      font-size: clamp(4px, 1.4vw, 7px);
      color: #252545;
      letter-spacing: 1px;
      text-align: center;
    }
  </style>
</head>
<body>
<canvas id="bg"></canvas>
<canvas id="fx"></canvas>

<div class="wrapper">
  <div class="title">&#9733; PIXEL CAT &#9733;</div>
  <div class="screen">
    <div class="screen-inner">
      <canvas id="cat"></canvas>
    </div>
  </div>
  <div id="mode-label">&#9829; IDLE &#9829;</div>
  <div id="hint-label">TAP TO PET &#9733; SLEEPS AFTER 10S</div>
</div>

<script>
// ─────────────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────────────
const SIZE = Math.round(Math.min(window.innerWidth * 0.72, window.innerHeight * 0.55, 320));
const C = document.getElementById('cat');
C.width = SIZE;
C.height = SIZE;
const ctx = C.getContext('2d');

// ─────────────────────────────────────────────────────
// STAR BG
// ─────────────────────────────────────────────────────
const bg = document.getElementById('bg');
const bctx = bg.getContext('2d');
function buildStars() {
  bg.width = window.innerWidth;
  bg.height = window.innerHeight;
  bctx.clearRect(0,0,bg.width,bg.height);
  for (let i = 0; i < 100; i++) {
    const x = Math.random()*bg.width, y = Math.random()*bg.height;
    const r = 0.5 + Math.random()*1.5;
    bctx.beginPath();
    bctx.arc(x, y, r, 0, Math.PI*2);
    bctx.fillStyle = `rgba(${180+Math.random()*75|0},${180+Math.random()*75|0},255,${0.2+Math.random()*0.7})`;
    bctx.fill();
  }
}
buildStars();
window.addEventListener('resize', buildStars);

// ─────────────────────────────────────────────────────
// FX CANVAS (hearts + zzz)
// ─────────────────────────────────────────────────────
const fx = document.getElementById('fx');
const fctx = fx.getContext('2d');
function resizeFx() { fx.width = window.innerWidth; fx.height = window.innerHeight; }
resizeFx();
window.addEventListener('resize', resizeFx);

const particles = [];
function spawnHearts(x, y) {
  for (let i = 0; i < 5; i++) {
    particles.push({
      type: 'heart',
      x: x + (Math.random()-.5)*80,
      y, vy: -(1.5+Math.random()*2.5),
      vx: (Math.random()-.5)*2,
      size: 10+Math.random()*14,
      alpha: 1,
      hue: Math.random()*40-20
    });
  }
}
function spawnZzz() {
  const rect = C.getBoundingClientRect();
  particles.push({
    type: 'zzz',
    x: rect.right - SIZE * 0.15,
    y: rect.top + SIZE * 0.28,
    text: Math.random() < .5 ? 'z' : 'Z',
    vy: -(0.5+Math.random()*0.7),
    vx: 0.4+Math.random()*0.6,
    size: 9+Math.floor(Math.random()*10),
    alpha: 1
  });
}

function drawHeart(ctx, x, y, s, alpha, hue) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = `hsl(${340+hue},100%,72%)`;
  ctx.shadowColor = `hsl(${340+hue},100%,80%)`;
  ctx.shadowBlur = 10;
  ctx.translate(x, y);
  ctx.beginPath();
  ctx.moveTo(0, s*0.3);
  ctx.bezierCurveTo(-s*0.5, -s*0.3, -s, s*0.1, 0, s*0.9);
  ctx.bezierCurveTo(s, s*0.1, s*0.5, -s*0.3, 0, s*0.3);
  ctx.fill();
  ctx.restore();
}

function tickParticles() {
  fctx.clearRect(0,0,fx.width,fx.height);
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.alpha -= 0.015;
    if (p.alpha <= 0) { particles.splice(i,1); continue; }
    if (p.type === 'heart') {
      drawHeart(fctx, p.x, p.y, p.size, p.alpha, p.hue);
    } else {
      fctx.save();
      fctx.globalAlpha = p.alpha;
      fctx.fillStyle = '#aaaaff';
      fctx.shadowColor = '#6677ff';
      fctx.shadowBlur = 8;
      fctx.font = `${p.size}px 'Press Start 2P', monospace`;
      fctx.fillText(p.text, p.x, p.y);
      fctx.restore();
    }
  }
}

// ─────────────────────────────────────────────────────
// CAT DRAWING
// ─────────────────────────────────────────────────────
const S = SIZE;
const cx = S * 0.5;  // center x

// Colors
const FUR     = '#F5A742';
const FUR_D   = '#D4843A';
const FUR_L   = '#FFCF85';
const STRIPE  = '#C06820';
const WHITE   = '#FFF5E8';
const PINK    = '#FFB0CC';
const NOSE    = '#FF6699';
const OUTLINE = '#2a1a0e';
const EYE_G   = '#44DD77';
const EYE_P   = '#003318';
const EYE_SH  = 'rgba(255,255,255,0.7)';
const MOUTH   = '#6a3010';

function px(n)  { return n * S; }   // proportion → pixels

// helper: rounded rect
function rrect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, r);
}

// ── BODY ──
function drawBody(bounce) {
  const by = px(0.56) + bounce;
  // shadow
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(cx, px(0.92), px(0.22), px(0.04), 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fill();
  ctx.restore();

  // body blob
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(cx, by, px(0.22), px(0.24), 0, 0, Math.PI*2);
  ctx.fillStyle = FUR;
  ctx.fill();
  ctx.strokeStyle = OUTLINE;
  ctx.lineWidth = px(0.018);
  ctx.stroke();
  ctx.restore();

  // belly highlight
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(cx, by + px(0.03), px(0.12), px(0.15), 0, 0, Math.PI*2);
  ctx.fillStyle = WHITE;
  ctx.globalAlpha = 0.55;
  ctx.fill();
  ctx.restore();

  // stripes
  for (let i = 0; i < 2; i++) {
    const sy = by - px(0.08) + i * px(0.09);
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(cx, sy, px(0.17), px(0.03), 0, 0, Math.PI*2);
    ctx.fillStyle = STRIPE;
    ctx.globalAlpha = 0.4;
    ctx.fill();
    ctx.restore();
  }
}

// ── TAIL ──
function drawTail(phase) {
  const swing = Math.sin(phase) * px(0.08);
  ctx.save();
  ctx.strokeStyle = FUR;
  ctx.lineWidth = px(0.07);
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.shadowColor = OUTLINE;
  ctx.shadowBlur = 3;
  ctx.beginPath();
  ctx.moveTo(cx + px(0.18), px(0.73));
  ctx.bezierCurveTo(
    cx + px(0.38), px(0.78),
    cx + px(0.42) + swing, px(0.60),
    cx + px(0.28) + swing, px(0.50)
  );
  ctx.stroke();
  // tip
  ctx.beginPath();
  ctx.arc(cx + px(0.28) + swing, px(0.50), px(0.045), 0, Math.PI*2);
  ctx.fillStyle = FUR_L;
  ctx.fill();
  ctx.restore();
}

// ── PAWS ──
function drawPaws(bounce) {
  const py2 = px(0.80) + bounce;
  // left paw
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(cx - px(0.12), py2, px(0.07), px(0.045), 0, 0, Math.PI*2);
  ctx.fillStyle = FUR;
  ctx.fill();
  ctx.strokeStyle = OUTLINE;
  ctx.lineWidth = px(0.015);
  ctx.stroke();
  ctx.restore();
  // left toe beans
  for (let j = -1; j <= 1; j++) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx - px(0.12) + j*px(0.025), py2 + px(0.015), px(0.012), 0, Math.PI*2);
    ctx.fillStyle = PINK;
    ctx.globalAlpha = 0.8;
    ctx.fill();
    ctx.restore();
  }
  // right paw
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(cx + px(0.12), py2, px(0.07), px(0.045), 0, 0, Math.PI*2);
  ctx.fillStyle = FUR;
  ctx.fill();
  ctx.strokeStyle = OUTLINE;
  ctx.lineWidth = px(0.015);
  ctx.stroke();
  ctx.restore();
  for (let j = -1; j <= 1; j++) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx + px(0.12) + j*px(0.025), py2 + px(0.015), px(0.012), 0, Math.PI*2);
    ctx.fillStyle = PINK;
    ctx.globalAlpha = 0.8;
    ctx.fill();
    ctx.restore();
  }
}

// ── HEAD ──
function drawHead(bounce, blinkT, isSleeping) {
  const hy = px(0.30) + bounce;

  // head base
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(cx, hy, px(0.26), px(0.24), 0, 0, Math.PI*2);
  ctx.fillStyle = FUR;
  ctx.fill();
  ctx.strokeStyle = OUTLINE;
  ctx.lineWidth = px(0.018);
  ctx.stroke();
  ctx.restore();

  // cheek blush
  for (const side of [-1,1]) {
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(cx + side*px(0.19), hy + px(0.05), px(0.06), px(0.03), 0, 0, Math.PI*2);
    ctx.fillStyle = '#FFAACC';
    ctx.globalAlpha = 0.35;
    ctx.fill();
    ctx.restore();
  }

  // ears
  for (const side of [-1,1]) {
    const ex = cx + side*px(0.16);
    const ey = hy - px(0.20);
    // outer
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(ex - side*px(0.01), ey + px(0.14));
    ctx.lineTo(ex - side*px(0.12), ey - px(0.08));
    ctx.lineTo(ex + side*px(0.09), ey + px(0.02));
    ctx.closePath();
    ctx.fillStyle = FUR;
    ctx.fill();
    ctx.strokeStyle = OUTLINE;
    ctx.lineWidth = px(0.016);
    ctx.stroke();
    ctx.restore();
    // inner pink
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(ex - side*px(0.005), ey + px(0.08));
    ctx.lineTo(ex - side*px(0.07), ey - px(0.02));
    ctx.lineTo(ex + side*px(0.04), ey + px(0.04));
    ctx.closePath();
    ctx.fillStyle = PINK;
    ctx.globalAlpha = 0.7;
    ctx.fill();
    ctx.restore();
  }

  // forehead stripe
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(cx, hy - px(0.12), px(0.07), px(0.025), 0, 0, Math.PI*2);
  ctx.fillStyle = STRIPE;
  ctx.globalAlpha = 0.5;
  ctx.fill();
  ctx.restore();

  // EYES
  const eyeY = hy + px(0.01);
  const eyeRx = px(0.26) * 0.42;

  if (isSleeping || blinkT > 0.5) {
    // closed / sleeping eyes — cute curved lines
    for (const side of [-1,1]) {
      const ex = cx + side * eyeRx;
      ctx.save();
      ctx.strokeStyle = OUTLINE;
      ctx.lineWidth = px(0.022);
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.arc(ex, eyeY + px(0.01), px(0.055), Math.PI, 0, false);
      ctx.stroke();
      // little lash
      ctx.beginPath();
      ctx.moveTo(ex + side*px(0.04), eyeY + px(0.01));
      ctx.lineTo(ex + side*px(0.065), eyeY - px(0.02));
      ctx.stroke();
      ctx.restore();
    }
    if (isSleeping) {
      // sleeping sparkle
      ctx.save();
      ctx.fillStyle = '#bbbbff';
      ctx.globalAlpha = 0.5;
      ctx.beginPath();
      ctx.arc(cx - px(0.06), eyeY + px(0.03), px(0.012), 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
  } else {
    // open eyes
    for (const side of [-1,1]) {
      const ex = cx + side * eyeRx;
      // white sclera
      ctx.save();
      ctx.beginPath();
      ctx.ellipse(ex, eyeY, px(0.068), px(0.072), 0, 0, Math.PI*2);
      ctx.fillStyle = WHITE;
      ctx.fill();
      ctx.strokeStyle = OUTLINE;
      ctx.lineWidth = px(0.016);
      ctx.stroke();
      ctx.restore();
      // iris
      ctx.save();
      ctx.beginPath();
      ctx.ellipse(ex, eyeY, px(0.044), px(0.052), 0, 0, Math.PI*2);
      ctx.fillStyle = EYE_G;
      ctx.fill();
      ctx.restore();
      // pupil
      ctx.save();
      ctx.beginPath();
      ctx.ellipse(ex, eyeY, px(0.022), px(0.038), 0, 0, Math.PI*2);
      ctx.fillStyle = EYE_P;
      ctx.fill();
      ctx.restore();
      // shine
      ctx.save();
      ctx.beginPath();
      ctx.ellipse(ex - px(0.012), eyeY - px(0.016), px(0.014), px(0.018), -0.4, 0, Math.PI*2);
      ctx.fillStyle = EYE_SH;
      ctx.fill();
      ctx.restore();
    }
  }

  // nose
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(cx, hy + px(0.09));
  ctx.bezierCurveTo(cx - px(0.025), hy + px(0.07), cx + px(0.025), hy + px(0.07), cx, hy + px(0.09));
  ctx.lineTo(cx - px(0.018), hy + px(0.065));
  ctx.bezierCurveTo(cx - px(0.03), hy + px(0.055), cx + px(0.03), hy + px(0.055), cx + px(0.018), hy + px(0.065));
  ctx.closePath();
  ctx.fillStyle = NOSE;
  ctx.fill();
  ctx.restore();

  // mouth
  ctx.save();
  ctx.strokeStyle = MOUTH;
  ctx.lineWidth = px(0.016);
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx, hy + px(0.096));
  ctx.lineTo(cx, hy + px(0.115));
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx, hy + px(0.115));
  ctx.bezierCurveTo(cx - px(0.01), hy + px(0.13), cx - px(0.04), hy + px(0.135), cx - px(0.055), hy + px(0.125));
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx, hy + px(0.115));
  ctx.bezierCurveTo(cx + px(0.01), hy + px(0.13), cx + px(0.04), hy + px(0.135), cx + px(0.055), hy + px(0.125));
  ctx.stroke();
  ctx.restore();

  // whiskers
  ctx.save();
  ctx.strokeStyle = WHITE;
  ctx.lineWidth = px(0.012);
  ctx.globalAlpha = 0.85;
  ctx.lineCap = 'round';
  for (const side of [-1,1]) {
    const wx = cx + side * px(0.04);
    const wy = hy + px(0.07);
    for (let w = 0; w < 3; w++) {
      const wo = (w - 1) * px(0.025);
      ctx.beginPath();
      ctx.moveTo(wx, wy + wo);
      ctx.lineTo(wx + side * px(0.18), wy + wo + side * px(0.01) * (w-1));
      ctx.stroke();
    }
  }
  ctx.restore();
}

// ── SLEEPING CURLED BODY ──
function drawCurledBody(phase) {
  const breathe = Math.sin(phase * 0.5) * px(0.008);

  // shadow
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(cx, px(0.88), px(0.30), px(0.04), 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.fill();
  ctx.restore();

  // curled body
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(cx + px(0.02), px(0.68) + breathe, px(0.28), px(0.18), 0.15, 0, Math.PI*2);
  ctx.fillStyle = FUR;
  ctx.fill();
  ctx.strokeStyle = OUTLINE;
  ctx.lineWidth = px(0.018);
  ctx.stroke();
  ctx.restore();

  // belly
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(cx + px(0.02), px(0.70) + breathe, px(0.16), px(0.10), 0.1, 0, Math.PI*2);
  ctx.fillStyle = WHITE;
  ctx.globalAlpha = 0.5;
  ctx.fill();
  ctx.restore();

  // sleeping tail wraps around
  ctx.save();
  ctx.strokeStyle = FUR;
  ctx.lineWidth = px(0.07);
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx - px(0.22), px(0.72) + breathe);
  ctx.bezierCurveTo(
    cx - px(0.38), px(0.78),
    cx - px(0.38), px(0.56),
    cx - px(0.15), px(0.53) + breathe
  );
  ctx.stroke();
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx - px(0.15), px(0.53) + breathe, px(0.04), 0, Math.PI*2);
  ctx.fillStyle = FUR_L;
  ctx.fill();
  ctx.restore();
  ctx.restore();

  // tucked paws
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(cx + px(0.08), px(0.82) + breathe, px(0.12), px(0.04), 0.2, 0, Math.PI*2);
  ctx.fillStyle = FUR;
  ctx.fill();
  ctx.strokeStyle = OUTLINE;
  ctx.lineWidth = px(0.014);
  ctx.stroke();
  ctx.restore();
  // paw toe beans
  for (let j = -1; j <= 1; j++) {
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx + px(0.10) + j*px(0.03), px(0.84) + breathe, px(0.011), 0, Math.PI*2);
    ctx.fillStyle = PINK;
    ctx.globalAlpha = 0.8;
    ctx.fill();
    ctx.restore();
  }
}

// ── SLEEPING HEAD ──
function drawSleepingHead(phase) {
  const breathe = Math.sin(phase * 0.5) * px(0.008);
  const hy = px(0.50) + breathe;
  drawHead(hy - px(0.30), 1.0, true); // reuse head at lower position w/ sleeping=true
}

// ─────────────────────────────────────────────────────
// ANIMATION STATE
// ─────────────────────────────────────────────────────
let sleeping = false;
let phase = 0;
let blinkPhase = 0;
let blinkTimer = 0;
let blinkInterval = 3500 + Math.random() * 2000;
let zzzTimer2 = 0;
let lastInteraction = Date.now();
let lastTs = 0;
let bounceAmt = 0;

const modeLabel = document.getElementById('mode-label');

function setMode(isSleeping) {
  sleeping = isSleeping;
  if (isSleeping) {
    modeLabel.textContent = '💤 SLEEPING 💤';
    modeLabel.classList.add('sleeping');
  } else {
    modeLabel.textContent = '♥ IDLE ♥';
    modeLabel.classList.remove('sleeping');
    blinkTimer = 0;
  }
}

function render(dt) {
  phase += dt * 0.003;
  ctx.clearRect(0, 0, S, S);

  if (sleeping) {
    // sleeping pose
    const breathe = Math.sin(phase * 0.5) * px(0.008);
    drawCurledBody(phase);

    // head sits on top of curled body
    const hy = px(0.47) + breathe;
    // shadow under head
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(cx + px(0.04), hy + px(0.22), px(0.18), px(0.025), 0, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    ctx.fill();
    ctx.restore();
    // head at sleep position
    const savedTx = ctx.getTransform();
    ctx.save();
    ctx.translate(px(0.04), hy - px(0.30));  // shift down from normal
    // nudge: just draw head inline
    ctx.restore();
    // inline head draw at sleep pos
    drawSleepHead(hy, phase);
  } else {
    // idle — gentle bob
    const bounce = Math.sin(phase) * px(0.012);
    const tailPhase = phase * 1.2;
    drawTail(tailPhase);
    drawBody(bounce);
    drawPaws(bounce);

    // blink logic
    blinkTimer += dt;
    let blinkT = 0;
    if (blinkTimer > blinkInterval) {
      const bt = (blinkTimer - blinkInterval);
      blinkT = bt < 120 ? bt / 120 : bt < 200 ? 1 : bt < 320 ? (320 - bt) / 120 : 0;
      if (blinkTimer > blinkInterval + 320) {
        blinkTimer = 0;
        blinkInterval = 3000 + Math.random() * 3000;
      }
    }
    drawHead(bounce, blinkT, false);
  }
}

function drawSleepHead(hy, ph) {
  const breathe = Math.sin(ph * 0.5) * px(0.008);
  const hcx = cx + px(0.04);

  // head tilt
  ctx.save();
  ctx.translate(hcx, hy);
  ctx.rotate(0.25);

  // head circle
  ctx.beginPath();
  ctx.ellipse(0, 0, px(0.24), px(0.22), 0, 0, Math.PI*2);
  ctx.fillStyle = FUR;
  ctx.fill();
  ctx.strokeStyle = OUTLINE;
  ctx.lineWidth = px(0.018);
  ctx.stroke();

  // cheek blush
  for (const side of [-1,1]) {
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(side*px(0.17), px(0.04), px(0.055), px(0.028), 0, 0, Math.PI*2);
    ctx.fillStyle = '#FFAACC';
    ctx.globalAlpha = 0.35;
    ctx.fill();
    ctx.restore();
  }

  // ears
  for (const side of [-1,1]) {
    const ex = side * px(0.14);
    const ey = -px(0.19);
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(ex - side*px(0.01), ey + px(0.13));
    ctx.lineTo(ex - side*px(0.11), ey - px(0.07));
    ctx.lineTo(ex + side*px(0.08), ey + px(0.01));
    ctx.closePath();
    ctx.fillStyle = FUR;
    ctx.fill();
    ctx.strokeStyle = OUTLINE;
    ctx.lineWidth = px(0.016);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(ex - side*px(0.005), ey + px(0.07));
    ctx.lineTo(ex - side*px(0.065), ey - px(0.01));
    ctx.lineTo(ex + side*px(0.035), ey + px(0.03));
    ctx.closePath();
    ctx.fillStyle = PINK;
    ctx.globalAlpha = 0.7;
    ctx.fill();
    ctx.restore();
  }

  // closed eyes — cute curved
  const eyeY = px(0.01);
  const eyeRx = px(0.24) * 0.42;
  for (const side of [-1,1]) {
    const ex = side * eyeRx;
    ctx.save();
    ctx.strokeStyle = OUTLINE;
    ctx.lineWidth = px(0.022);
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.arc(ex, eyeY, px(0.052), Math.PI, 0, false);
    ctx.stroke();
    ctx.restore();
  }

  // nose
  ctx.save();
  ctx.fillStyle = NOSE;
  ctx.beginPath();
  ctx.moveTo(0, px(0.085));
  ctx.lineTo(-px(0.017), px(0.065));
  ctx.bezierCurveTo(-px(0.028), px(0.052), px(0.028), px(0.052), px(0.017), px(0.065));
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // whiskers
  ctx.save();
  ctx.strokeStyle = WHITE;
  ctx.lineWidth = px(0.011);
  ctx.globalAlpha = 0.8;
  ctx.lineCap = 'round';
  for (const side of [-1,1]) {
    for (let w = 0; w < 3; w++) {
      const wo = (w-1)*px(0.022);
      ctx.beginPath();
      ctx.moveTo(side*px(0.03), px(0.065)+wo);
      ctx.lineTo(side*px(0.19), px(0.065)+wo + side*px(0.01)*(w-1));
      ctx.stroke();
    }
  }
  ctx.restore();

  ctx.restore(); // end rotate/translate
}

// ─────────────────────────────────────────────────────
// LOOP
// ─────────────────────────────────────────────────────
let zzzTick = 0;
function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min(ts - lastTs, 50);
  lastTs = ts;

  if (!sleeping && Date.now() - lastInteraction > 10000) setMode(true);

  if (sleeping) {
    zzzTick += dt;
    if (zzzTick > 1200) { zzzTick = 0; spawnZzz(); }
  }

  render(dt);
  tickParticles();
}

// ─────────────────────────────────────────────────────
// INPUT
// ─────────────────────────────────────────────────────
function onInteract(e) {
  lastInteraction = Date.now();
  if (sleeping) setMode(false);
  let x, y;
  if (e.touches) { x = e.touches[0].clientX; y = e.touches[0].clientY; }
  else { x = e.clientX; y = e.clientY; }
  spawnHearts(x, y);
}
document.addEventListener('click', onInteract);
document.addEventListener('touchstart', onInteract, { passive: true });
document.addEventListener('mousemove', () => lastInteraction = Date.now());

requestAnimationFrame(loop);
</script>
</body>
</html>
